<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minee Beauty</title>
  <link rel="stylesheet" href="checkout.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

</head>
 <header>
    <nav class="navbar">
      <div class="logo"><img src="./image/logo copy.png" alt="banner-top" style="width: 60px;" ></div>
</nav>
</header>
<body>

<div class="checkout-container">
  <h2>Your Checkout Item</h2>

  <!-- Cart Items -->
  <ul id="cart-items"></ul>
  <h3 id="cart-total"></h3>

  <!-- Payment Options -->
  <h3>Choose Payment Method</h3>
  <button class="pay-btn" onclick="payByBank()">Pay by Bank QR</button>
  <button class="pay-btn" onclick="payByPhone()">Pay by Phone Number</button>
  <button class="pay-btn" onclick="payByCash()">Cash on Delivery</button>

  <!-- Bank QR -->
  <div id="bank-qr" class="payment-section">
    <p>Scan this QR to pay:</p>
    <img src="./image/payment/qr1.jpg" alt="Bank QR Code" class="qr-code">
    <img src="./image/payment/q2.jpg" alt="Bank QR Code" class="qr-code">

    <p><strong>Bank ID:</strong> 015 479 408</p>
    <button class="pay-btn" onclick="finishOrder()">Done</button>
  </div>

  <!-- Phone -->
  <div id="phone-pay" class="payment-section">
    <p>Send payment to phone number:</p>
    <strong>+855-15 479 408</strong>
    <button class="pay-btn" onclick="finishOrder()">Done</button>
  </div>

  <!-- Cash -->
  <div id="cash-pay" class="payment-section">
    <p>Your order is confirmed.</p>
    <p>Please prepare cash for delivery.</p>
    <button class="pay-btn" onclick="finishOrder()">Done</button>
  </div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCheckoutCart() {
  const cartItems = document.getElementById("cart-items");
  const cartTotal = document.getElementById("cart-total");

  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price * item.quantity;

    const li = document.createElement("li");
    li.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:10px;">
        <span><b>${item.name}</b></span>
        <span>Qty: ${item.quantity}</span>
        <span>$${(item.price * item.quantity).toFixed(2)}</span>
      </div>
    `;
    cartItems.appendChild(li);
  });

  cartTotal.innerText = "Total: $" + total.toFixed(2);
}

/* ================= PAYMENT UI ================= */

function hideAllPayments() {
  document.getElementById("bank-qr").style.display = "none";
  document.getElementById("phone-pay").style.display = "none";
  document.getElementById("cash-pay").style.display = "none";
}

function payByBank() {
  hideAllPayments();
  document.getElementById("bank-qr").style.display = "block";
}

function payByPhone() {
  hideAllPayments();
  document.getElementById("phone-pay").style.display = "block";
}

function payByCash() {
  hideAllPayments();
  document.getElementById("cash-pay").style.display = "block";
}

/* ================= FINISH ORDER (FIXED + MODERN) ================= */

function finishOrder() {
  if (!cart.length) {
    alert("Cart is empty!");
    return;
  }

  const user = JSON.parse(localStorage.getItem("user"));

  const order = {
    customer_name: user?.name || "Guest",
    address: user?.address || "No address",
    items: cart,
    total: cart.reduce((sum, i) => sum + i.price * i.quantity, 0),
    created_at: new Date().toISOString()
  };

  //  Save to "orders" (IMPORTANT FIX)
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  // clear cart
  localStorage.removeItem("cart");

  alert("Thank you! Your order is confirmed.");

  // go to profile history
  window.location.href = "profileinfo.html";
}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", () => {
  renderCheckoutCart();
  hideAllPayments();
});
</script>


</body>
</html>
